<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SYNAPSE V1.2 // ULTIMATE P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00ff41; --bg: #050505; --dim: #003b00; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; font-size: 14px; }
        #log { flex: 1; padding: 20px; overflow-y: auto; white-space: pre-wrap; border-bottom: 1px solid var(--dim); border-left: 2px solid var(--dim); margin: 10px; background: rgba(0,20,0,0.2); }
        .controls { padding: 15px; background: #000; display: flex; gap: 10px; }
        input { background: #000; border: 1px solid var(--dim); color: var(--green); padding: 10px; flex: 1; outline: none; }
        button { background: var(--dim); color: var(--green); border: 1px solid var(--green); cursor: pointer; padding: 10px 20px; text-transform: uppercase; font-weight: bold; }
        button:hover:not(:disabled) { background: var(--green); color: #000; box-shadow: 0 0 10px var(--green); }
        .sys { color: #555; }
        .sec { color: #fff; text-shadow: 0 0 5px var(--green); font-weight: bold; }
        .err { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

<div style="padding: 15px; border-bottom: 1px solid var(--dim);">
    SYNAPSE TERMINAL [<span id="status">OFFLINE</span>]<br>
    ID: <span id="my-id" style="color:#fff">CONNECTING...</span>
</div>

<div id="log"></div>

<div class="controls" id="setup-ui">
    <input type="text" id="target-id" placeholder="PASTE PEER ID...">
    <button id="btn-connect">ESTABLISH LINK</button>
</div>

<div class="controls" id="chat-ui" style="display:none;">
    <input type="text" id="msg" placeholder="TYPE ENCRYPTED PACKET...">
    <button id="btn-send">SEND</button>
</div>

<script>
let peer, conn, myRSA, sessionAES;

const ui = {
    log: (t, c='') => {
        const d = document.createElement('div');
        d.className = c;
        d.innerHTML = `[${new Date().toLocaleTimeString()}] ${t}`;
        document.getElementById('log').appendChild(d);
        document.getElementById('log').scrollTop = 999999;
    },
    status: (t) => document.getElementById('status').innerText = t
};

async function boot() {
    ui.log("Инициализация крипто-ядра...", "sys");
    myRSA = await crypto.subtle.generateKey(
        { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
        true, ["encrypt", "decrypt"]
    );

    // Конфигурация с расширенными STUN
    peer = new Peer({
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:global.stun.twilio.com:3478' }
            ],
            'sdpSemantics': 'unified-plan'
        }
    });

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        ui.status("ONLINE / READY");
        ui.log(`Ваш узел активен. ID: ${id}`, "sec");

        const inviteId = new URLSearchParams(window.location.search).get('join');
        if(inviteId) {
            ui.log(`Найден ID в URL. Пробую пробить туннель к ${inviteId}...`, "sys");
            setTimeout(() => startConnection(inviteId), 1000);
        }
    });

    peer.on('connection', (c) => {
        ui.log("Обнаружен входящий запрос. Синхронизация...");
        conn = c;
        initHandlers();
    });

    peer.on('error', (e) => ui.log(`PEER ERROR: ${e.type}`, "err"));
}

function startConnection(targetId) {
    if(!targetId) return;
    conn = peer.connect(targetId, {
        reliable: true,
        serialization: 'json'
    });
    initHandlers();
}

function initHandlers() {
    // Таймаут на случай зависания туннеля
    const handshakeTimeout = setTimeout(() => {
        if(ui.status.innerText !== "ENCRYPTED") {
            ui.log("Туннель завис. Попробуйте обновить страницу обеим сторонам.", "err");
        }
    }, 10000);

    conn.on('open', async () => {
        ui.log("P2P туннель открыт! Начинаю обмен ключами...", "sys");
        const pub = await crypto.subtle.exportKey("spki", myRSA.publicKey);
        conn.send({ cmd: 'KEY_RSA', payload: Array.from(new Uint8Array(pub)) });
    });

    conn.on('data', async (data) => {
        if(data.cmd === 'KEY_RSA') {
            const peerPub = await crypto.subtle.importKey("spki", new Uint8Array(data.payload), {name: "RSA-OAEP", hash: "SHA-256"}, true, ["encrypt"]);
            
            if(!sessionAES && conn.peerReceiver !== peer) {
                ui.log("Генерация AES-256 ключа сессии...");
                sessionAES = await crypto.subtle.generateKey({name: "AES-GCM", length: 256}, true, ["encrypt", "decrypt"]);
                const raw = await crypto.subtle.exportKey("raw", sessionAES);
                const wrapped = await crypto.subtle.encrypt({name: "RSA-OAEP"}, peerPub, raw);
                conn.send({ cmd: 'KEY_AES', payload: Array.from(new Uint8Array(wrapped)) });
                enableChat();
            }
        } 
        else if(data.cmd === 'KEY_AES') {
            ui.log("Дешифровка сессионного ключа...");
            const unwrapped = await crypto.subtle.decrypt({name: "RSA-OAEP"}, myRSA.privateKey, new Uint8Array(data.payload));
            sessionAES = await crypto.subtle.importKey("raw", unwrapped, "AES-GCM", true, ["encrypt", "decrypt"]);
            enableChat();
        }
        else if(data.cmd === 'MSG') {
            const dec = await crypto.subtle.decrypt({name: "AES-GCM", iv: new Uint8Array(data.iv)}, sessionAES, new Uint8Array(data.payload));
            ui.log(`SENDER: ${new TextDecoder().decode(dec)}`, "sec");
        }
    });

    conn.on('close', () => location.reload());
}

function enableChat() {
    clearTimeout();
    ui.status("ENCRYPTED");
    document.getElementById('setup-ui').style.display = 'none';
    document.getElementById('chat-ui').style.display = 'flex';
    ui.log("КАНАЛ ЗАЩИЩЕН. Zero-Knowledge режим активен.", "sys");
}

async function send() {
    const val = document.getElementById('msg').value;
    if(!val || !sessionAES) return;
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt({name: "AES-GCM", iv}, sessionAES, new TextEncoder().encode(val));
    conn.send({ cmd: 'MSG', payload: Array.from(new Uint8Array(enc)), iv: Array.from(iv) });
    ui.log(`YOU: ${val}`);
    document.getElementById('msg').value = '';
}

document.getElementById('btn-connect').onclick = () => startConnection(document.getElementById('target-id').value);
document.getElementById('btn-send').onclick = send;
document.getElementById('msg').onkeypress = (e) => e.key === 'Enter' && send();

boot();
</script>
</body>
</html>
