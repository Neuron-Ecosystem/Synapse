<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SYNAPSE // P2P BROWSER</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00ff41; --bg: #050505; --dim: #003b00; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #log { flex: 1; padding: 20px; overflow-y: auto; white-space: pre-wrap; border-bottom: 1px solid var(--dim); scroll-behavior: smooth; }
        .controls { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--dim); }
        input { background: #000; border: 1px solid var(--dim); color: var(--green); padding: 10px; outline: none; flex: 1; }
        button { background: var(--dim); color: var(--green); border: 1px solid var(--green); cursor: pointer; padding: 5px 20px; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        button:hover:not(:disabled) { background: var(--green); color: #000; }
        .system { color: #555; font-size: 0.9em; }
        .secure { color: #fff; text-shadow: 0 0 5px var(--green); }
        #invite-link { color: #008f11; cursor: pointer; text-decoration: underline; font-size: 0.8em; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div style="padding: 10px; border-bottom: 1px solid var(--dim); background: #000;">
    <div>STATUS: <span id="status">CRYPTO_INIT...</span></div>
    <div>YOUR ID: <span id="my-id" style="color:#fff">---</span></div>
    <span id="invite-link"></span>
</div>

<div id="log"></div>

<div class="controls" id="connect-area">
    <input type="text" id="peer-id-input" placeholder="Вставьте ID собеседника...">
    <button id="connect-btn" disabled>CONNECT</button>
</div>

<div class="controls" id="chat-area" style="display:none;">
    <input type="text" id="msg-input" placeholder="Введите сообщение...">
    <button id="send-btn">SEND</button>
</div>

<script>
/**
 * SYNAPSE // Прямое P2P шифрование в браузере
 */
let peer, conn, myKeys, sessionAES;

const dom = {
    log: document.getElementById('log'),
    status: document.getElementById('status'),
    myId: document.getElementById('my-id'),
    invite: document.getElementById('invite-link'),
    peerInput: document.getElementById('peer-id-input'),
    connectBtn: document.getElementById('connect-btn'),
    chatArea: document.getElementById('chat-area'),
    connectArea: document.getElementById('connect-area'),
    msgInput: document.getElementById('msg-input'),
    sendBtn: document.getElementById('send-btn')
};

function writeLog(txt, cls='') {
    const d = document.createElement('div');
    d.className = cls;
    d.innerText = `> ${txt}`;
    dom.log.appendChild(d);
    dom.log.scrollTop = dom.log.scrollHeight;
}

// 1. Инициализация шифрования
async function init() {
    writeLog("Генерация ключей RSA-2048 (Zero-Knowledge)...", "system");
    myKeys = await crypto.subtle.generateKey(
        { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
        true, ["encrypt", "decrypt"]
    );
    
    writeLog("Криптография готова. Запуск P2P...", "system");
    setupPeer();
}

// 2. Настройка P2P (PeerJS)
function setupPeer() {
    peer = new Peer();

    peer.on('open', (id) => {
        dom.myId.innerText = id;
        dom.status.innerText = "READY / WAITING";
        dom.connectBtn.disabled = false;
        
        // Создаем ссылку-приглашение
        const url = `${window.location.origin}${window.location.pathname}?join=${id}`;
        dom.invite.innerText = "Скопировать ссылку-приглашение";
        dom.invite.onclick = () => {
            navigator.clipboard.writeText(url);
            alert("Ссылка скопирована!");
        };

        // Авто-вход, если есть ID в URL
        const params = new URLSearchParams(window.location.search);
        const joinId = params.get('join');
        if(joinId) {
            dom.peerInput.value = joinId;
            writeLog(`Обнаружен ID в URL: ${joinId}. Подключаюсь...`);
            setTimeout(connectToPeer, 1000); 
        }
    });

    peer.on('connection', (c) => {
        conn = c;
        handleChat();
    });

    peer.on('error', (err) => {
        writeLog(`Ошибка: ${err.type}`, "system");
        console.error(err);
    });
}

// 3. Подключение к другому участнику
function connectToPeer() {
    const rId = dom.peerInput.value.trim();
    if(!rId) return;
    writeLog(`Попытка связи с ${rId}...`);
    conn = peer.connect(rId);
    handleChat();
}

// 4. Логика обмена ключами (Handshake) и чата
function handleChat() {
    conn.on('open', async () => {
        dom.status.innerText = "HANDSHAKE...";
        // Отправляем публичный ключ
        const pubKeyRaw = await crypto.subtle.exportKey("spki", myKeys.publicKey);
        conn.send({ type: 'PUB', key: Array.from(new Uint8Array(pubKeyRaw)) });
    });

    conn.on('data', async (data) => {
        if (data.type === 'PUB') {
            const peerPub = await crypto.subtle.importKey("spki", new Uint8Array(data.key), {name: "RSA-OAEP", hash: "SHA-256"}, true, ["encrypt"]);
            
            // Если мы подключились к кому-то, мы генерируем общий ключ сессии AES
            if (conn.peerReceiver !== peer) {
                sessionAES = await crypto.subtle.generateKey({name: "AES-GCM", length: 256}, true, ["encrypt", "decrypt"]);
                const rawAES = await crypto.subtle.exportKey("raw", sessionAES);
                const encryptedAES = await crypto.subtle.encrypt({name: "RSA-OAEP"}, peerPub, rawAES);
                conn.send({ type: 'AES', key: Array.from(new Uint8Array(encryptedAES)) });
                startChat();
            }
        } 
        else if (data.type === 'AES') {
            const decryptedRaw = await crypto.subtle.decrypt({name: "RSA-OAEP"}, myKeys.privateKey, new Uint8Array(data.key));
            sessionAES = await crypto.subtle.importKey("raw", decryptedRaw, "AES-GCM", true, ["encrypt", "decrypt"]);
            startChat();
        }
        else if (data.type === 'MSG') {
            const dec = await crypto.subtle.decrypt({name: "AES-GCM", iv: new Uint8Array(data.iv)}, sessionAES, new Uint8Array(data.data));
            writeLog(`Peer: ${new TextDecoder().decode(dec)}`, "secure");
        }
    });
}

function startChat() {
    dom.status.innerText = "SECURE (AES-256)";
    dom.connectArea.style.display = "none";
    dom.chatArea.style.display = "flex";
    writeLog("Канал зашифрован. Приятного общения.", "system");
}

async function send() {
    const val = dom.msgInput.value;
    if(!val || !sessionAES) return;
    
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt({name: "AES-GCM", iv}, sessionAES, new TextEncoder().encode(val));
    
    conn.send({ type: 'MSG', data: Array.from(new Uint8Array(enc)), iv: Array.from(iv) });
    writeLog(`You: ${val}`);
    dom.msgInput.value = "";
}

// Привязка событий
dom.connectBtn.onclick = connectToPeer;
dom.sendBtn.onclick = send;
dom.msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };

// Старт
init();
</script>
</body>
</html>
