<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SYNAPSE // P2P TERMINAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00ff41; --bg: #050505; --dim: #003b00; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #log { flex: 1; padding: 20px; overflow-y: auto; white-space: pre-wrap; border-bottom: 1px solid var(--dim); scroll-behavior: smooth; }
        .controls { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--dim); }
        input { background: #000; border: 1px solid var(--dim); color: var(--green); padding: 10px; outline: none; flex: 1; }
        button { background: var(--dim); color: var(--green); border: 1px solid var(--green); cursor: pointer; padding: 5px 20px; font-weight: bold; }
        button:disabled { opacity: 0.3; }
        .system { color: #555; font-size: 0.9em; }
        .secure { color: #fff; text-shadow: 0 0 5px var(--green); }
        .error { color: #ff0055; }
        #invite-link { color: var(--green); cursor: pointer; text-decoration: underline; font-size: 0.8em; display: block; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>

<div style="padding: 10px; border-bottom: 1px solid var(--dim); background: #000;">
    <div>STATUS: <span id="status">INIT...</span></div>
    <div>ID: <span id="my-id" style="color:#fff">---</span></div>
    <span id="invite-link"></span>
</div>

<div id="log"></div>

<div class="controls" id="connect-area">
    <input type="text" id="peer-id-input" placeholder="ID собеседника...">
    <button id="connect-btn" disabled>CONNECT</button>
</div>

<div class="controls" id="chat-area" style="display:none;">
    <input type="text" id="msg-input" placeholder="Зашифрованный пакет...">
    <button id="send-btn">SEND</button>
</div>

<script>
let peer, conn, myKeys, sessionAES;

const dom = {
    log: document.getElementById('log'),
    status: document.getElementById('status'),
    myId: document.getElementById('my-id'),
    invite: document.getElementById('invite-link'),
    peerInput: document.getElementById('peer-id-input'),
    connectBtn: document.getElementById('connect-btn'),
    chatArea: document.getElementById('chat-area'),
    connectArea: document.getElementById('connect-area'),
    msgInput: document.getElementById('msg-input'),
    sendBtn: document.getElementById('send-btn')
};

function writeLog(txt, cls='') {
    const d = document.createElement('div');
    d.className = cls;
    d.innerText = `> ${txt}`;
    dom.log.appendChild(d);
    dom.log.scrollTop = dom.log.scrollHeight;
}

async function init() {
    writeLog("Генерация RSA-2048...", "system");
    myKeys = await crypto.subtle.generateKey(
        { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
        true, ["encrypt", "decrypt"]
    );
    setupPeer();
}

function setupPeer() {
    // Добавляем Google STUN серверы для обхода NAT
    peer = new Peer({
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]
        }
    });

    peer.on('open', (id) => {
        dom.myId.innerText = id;
        dom.status.innerText = "READY";
        dom.connectBtn.disabled = false;
        
        const url = `${window.location.origin}${window.location.pathname}?join=${id}`;
        dom.invite.innerText = "Скопировать ссылку-приглашение";
        dom.invite.onclick = () => {
            navigator.clipboard.writeText(url);
            writeLog("Ссылка скопирована в буфер.");
        };

        const joinId = new URLSearchParams(window.location.search).get('join');
        if(joinId) {
            dom.peerInput.value = joinId;
            writeLog(`Авто-подключение к: ${joinId}`);
            setTimeout(connectToPeer, 1500); 
        }
    });

    peer.on('connection', (incoming) => {
        writeLog("Входящий запрос на соединение...");
        conn = incoming;
        bindEvents();
    });

    peer.on('error', (err) => writeLog(`Ошибка PeerJS: ${err.type}`, "error"));
}

function connectToPeer() {
    const rId = dom.peerInput.value.trim();
    if(!rId || rId === peer.id) return;
    writeLog(`Создание P2P туннеля к ${rId}...`);
    conn = peer.connect(rId, { reliable: true });
    bindEvents();
}

function bindEvents() {
    conn.on('open', async () => {
        writeLog("Туннель открыт. Запуск обмена ключами...");
        dom.status.innerText = "HANDSHAKE";
        const pub = await crypto.subtle.exportKey("spki", myKeys.publicKey);
        conn.send({ type: 'RSA_PUB', key: Array.from(new Uint8Array(pub)) });
    });

    conn.on('data', async (data) => {
        if (data.type === 'RSA_PUB') {
            writeLog("Получен публичный ключ собеседника.");
            const peerPub = await crypto.subtle.importKey("spki", new Uint8Array(data.key), {name: "RSA-OAEP", hash: "SHA-256"}, true, ["encrypt"]);
            
            // Инициатор (тот кто нажал Connect) создает AES ключ
            if (conn.peerReceiver !== peer) {
                sessionAES = await crypto.subtle.generateKey({name: "AES-GCM", length: 256}, true, ["encrypt", "decrypt"]);
                const raw = await crypto.subtle.exportKey("raw", sessionAES);
                const wrapped = await crypto.subtle.encrypt({name: "RSA-OAEP"}, peerPub, raw);
                conn.send({ type: 'AES_KEY', key: Array.from(new Uint8Array(wrapped)) });
                startChat();
            }
        } 
        else if (data.type === 'AES_KEY') {
            writeLog("Получен зашифрованный сессионный ключ.");
            const unwrapped = await crypto.subtle.decrypt({name: "RSA-OAEP"}, myKeys.privateKey, new Uint8Array(data.key));
            sessionAES = await crypto.subtle.importKey("raw", unwrapped, "AES-GCM", true, ["encrypt", "decrypt"]);
            startChat();
        }
        else if (data.type === 'MSG') {
            const dec = await crypto.subtle.decrypt({name: "AES-GCM", iv: new Uint8Array(data.iv)}, sessionAES, new Uint8Array(data.data));
            writeLog(`SENDER: ${new TextDecoder().decode(dec)}`, "secure");
        }
    });

    conn.on('close', () => {
        writeLog("Соединение разорвано.", "error");
        location.reload();
    });
}

function startChat() {
    dom.status.innerText = "ENCRYPTED";
    dom.connectArea.style.display = "none";
    dom.chatArea.style.display = "flex";
    writeLog("Сквозное шифрование AES-256 активно.", "system");
}

async function send() {
    const val = dom.msgInput.value;
    if(!val || !sessionAES) return;
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt({name: "AES-GCM", iv}, sessionAES, new TextEncoder().encode(val));
    conn.send({ type: 'MSG', data: Array.from(new Uint8Array(enc)), iv: Array.from(iv) });
    writeLog(`YOU: ${val}`);
    dom.msgInput.value = "";
}

dom.connectBtn.onclick = connectToPeer;
dom.sendBtn.onclick = send;
dom.msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };

init();
</script>
</body>
</html>
